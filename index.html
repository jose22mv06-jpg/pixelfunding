<!DOCTYPE html>
<html>
<head>
<title>PixelFunding</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
}

#grid{
display:grid;
grid-template-columns:repeat(50,16px);
width:800px;
margin:40px auto;
}

.pixel{
width:16px;
height:16px;
border:1px solid #e5e5e5;
cursor:pointer;
background:white;
transition:0.2s;
}

.pixel:hover{
transform:scale(1.2);
border-color:#999;
}
</style>

</head>

<body>

<h1>PixelFunding</h1>
<p>Haz clic en un pixel</p>
<p id="counter">Pixels vendidos: 0 / 2500</p>

<div id="grid"></div>
<div id="purchaseBox" style="
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
width:300px;
z-index:1000;
text-align:center;
"><h3>Comprar Pixel</h3>

<input id="nameInput" placeholder="Nombre" style="width:90%; margin:5px;"><br>

<input id="linkInput" placeholder="Link" style="width:90%; margin:5px;"><br>

<input id="colorInput" type="color" style="margin:10px;"><br>

<button id="buyButton">Comprar</button>
<button id="cancelButton">Cancelar</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCE_Wsp4bpohzngVpQYN16pG5xj6tWjXUg",
authDomain: "pixelfunding-522a5.firebaseapp.com",
databaseURL: "https://pixelfunding-522a5-default-rtdb.firebaseio.com",
projectId: "pixelfunding-522a5",
storageBucket: "pixelfunding-522a5.firebasestorage.app",
messagingSenderId: "3268326785",
appId: "1:3268326785:web:9204ea2483d518d4b3a480"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const grid = document.getElementById("grid");
const counter = document.getElementById("counter");

const purchaseBox = document.getElementById("purchaseBox");
const nameInput = document.getElementById("nameInput");
const linkInput = document.getElementById("linkInput");
const colorInput = document.getElementById("colorInput");
const buyButton = document.getElementById("buyButton");
const overlay = document.getElementById("overlay");
const cancelButton = document.getElementById("cancelButton");

let selectedPixel = null;

let soldPixels = 0;
for(let i=0;i<2500;i++){

const pixel = document.createElement("div");
pixel.className = "pixel";
pixel.dataset.id = i;
pixel.title = "Pixel #" + i;

onValue(ref(db,"pixels/"+i),(snapshot)=>{

const data = snapshot.val();

if(data){

pixel.style.background = data.color;
pixel.title = data.name + " - " + data.link;

soldPixels++;
counter.textContent = "Pixels vendidos: " + soldPixels + " / 2500";

pixel.onclick=()=>{
window.open(data.link,"_blank");
};

}else{

pixel.onclick=()=>{
selectedPixel = i;
purchaseBox.style.display = "block";
overlay.style.display = "block";
};

}

});

grid.appendChild(pixel);

}

buyButton.onclick = ()=>{
cancelButton.onclick = ()=>{

purchaseBox.style.display = "none";
overlay.style.display = "none";

nameInput.value="";
linkInput.value="";

};

const name = nameInput.value;
const link = linkInput.value;
const color = colorInput.value;

if(name && link && color){

set(ref(db,"pixels/"+selectedPixel),{
name:name,
link:link,
color:color
});

purchaseBox.style.display = "none";

nameInput.value="";
linkInput.value="";

}

};

</script>

</body>
</html>
