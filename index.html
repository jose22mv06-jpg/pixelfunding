<!DOCTYPE html>
<html>
<head>
<title>PixelFunding</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
}

#grid{
display:grid;
grid-template-columns:repeat(50,12px);
width:600px;
margin:30px auto;
}

.pixel{
width:12px;
height:12px;
border:1px solid #ddd;
cursor:pointer;
background:white;
}
</style>

</head>

<body>

<h1>PixelFunding</h1>
<p>Haz clic en un pixel</p>

<div id="grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCE_Wsp4bpohzngVpQYN16pG5xj6tWjXUg",
authDomain: "pixelfunding-522a5.firebaseapp.com",
databaseURL: "https://pixelfunding-522a5-default-rtdb.firebaseio.com",
projectId: "pixelfunding-522a5",
storageBucket: "pixelfunding-522a5.firebasestorage.app",
messagingSenderId: "3268326785",
appId: "1:3268326785:web:9204ea2483d518d4b3a480"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const grid = document.getElementById("grid");

for(let i=0;i<2500;i++){

const pixel=document.createElement("div");
pixel.className="pixel";

pixel.onclick=()=>{

const name = prompt("Nombre del patrocinador:");
const link = prompt("Link del sitio:");
const color = prompt("Color del pixel:");

set(ref(db,"pixels/"+i),{
name:name,
link:link,
color:color
});

};

onValue(ref(db,"pixels/"+i),(snapshot)=>{

const data = snapshot.val();

if(data){
pixel.style.background=data.color || "black";
pixel.title=data.name;

pixel.onclick=()=>{
window.open(data.link,"_blank");
};

}

});

grid.appendChild(pixel);

}

</script>

</body>
</html>
