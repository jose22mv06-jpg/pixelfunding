<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pixelfunding</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

h1{
margin-top:20px;
}

#stats{
margin:10px;
font-size:18px;
}

#canvasContainer{
margin:auto;
width:800px;
height:800px;
border:2px solid white;
overflow:auto;
background:black;
}

#grid{
display:grid;
grid-template-columns: repeat(317, 5px);
grid-template-rows: repeat(317, 5px);
transform-origin: top left;
}

.pixel{
width:5px;
height:5px;
background:#1e293b;
cursor:pointer;
}

.pixel:hover{
background:#22c55e;
}

.sold{
background:#ef4444;
}

.selected{
background:#3b82f6;
}

#panel{
margin-top:20px;
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

.paypal{
background:#0070ba;
color:white;
}

.mercado{
background:#009ee3;
color:white;
}

</style>
</head>

<body>

<h1>PIXELFUNDING</h1>

<div id="stats">
Pixeles seleccionados: <span id="count">0</span> |
Total recaudado: $<span id="money">0</span>
</div>

<div id="canvasContainer">
<div id="grid"></div>
</div>

<div id="panel">

<button class="paypal" onclick="pagarPaypal()">
Pagar con PayPal
</button>

<button class="mercado" onclick="pagarMercado()">
Pagar con MercadoPago
</button>

</div>

<script>

const precioPixel = 5

const grid = document.getElementById("grid")

let seleccionados=[]
let vendidos = JSON.parse(localStorage.getItem("pixelesVendidos")) || []

let zoom = 1

function actualizarDinero(){
document.getElementById("money").innerText = vendidos.length * precioPixel
}

for(let i=0;i<317*317;i++){

let pixel = document.createElement("div")
pixel.classList.add("pixel")

if(vendidos.includes(i)){
pixel.classList.add("sold")
}

pixel.addEventListener("click",()=>{

if(pixel.classList.contains("sold")) return

pixel.classList.toggle("selected")

if(pixel.classList.contains("selected")){
seleccionados.push(i)
}else{
seleccionados = seleccionados.filter(p=>p!=i)
}

document.getElementById("count").innerText = seleccionados.length

})

grid.appendChild(pixel)

}

actualizarDinero()

function pagarPaypal(){

if(seleccionados.length==0){
alert("Selecciona pixeles primero")
return
}

seleccionados.forEach(p=>{
vendidos.push(p)
})

localStorage.setItem("pixelesVendidos",JSON.stringify(vendidos))

alert("Compra simulada completada")

location.reload()

}

function pagarMercado(){

if(seleccionados.length==0){
alert("Selecciona pixeles primero")
return
}

seleccionados.forEach(p=>{
vendidos.push(p)
})

localStorage.setItem("pixelesVendidos",JSON.stringify(vendidos))

alert("Compra simulada completada")

location.reload()

}

document.getElementById("canvasContainer").addEventListener("wheel",function(e){

e.preventDefault()

zoom += e.deltaY * -0.001
zoom = Math.min(Math.max(.5, zoom), 5)

grid.style.transform = "scale("+zoom+")"

})

</script>

</body>
</html>
